services:
  back-ventas:
    build: .
    container_name: back-ventas
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db-ventas
    restart: unless-stopped

  db-ventas:
    image: mysql:8
    container_name: db-ventas
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - dbdata_ventas:/var/lib/mysql
    restart: unless-stopped

volumes:
  dbdata_ventas: